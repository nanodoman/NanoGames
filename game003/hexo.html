<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <script src="src/main.js?v=4.0.0" defer></script>
    <link rel="stylesheet" href="src/style.css?v=4.0.0" />
    <title>Hexo</title>
  </head>

  <body class="reset">
    <div class="grid">
      <!-- center -->
      <div class="hex" data-r="0" data-c="0"></div>
      <!-- rim 1 -->
      <div class="hex" data-r="1" data-c="-1"></div>
      <div class="hex" data-r="1" data-c="0"></div>
      <div class="hex" data-r="0" data-c="1"></div>
      <div class="hex" data-r="-1" data-c="1"></div>
      <div class="hex" data-r="-1" data-c="0"></div>
      <div class="hex" data-r="0" data-c="-1"></div>
      <!-- rim 2 -->
      <div class="hex" data-r="2" data-c="-2"></div>
      <div class="hex" data-r="2" data-c="-1"></div>
      <div class="hex" data-r="2" data-c="0"></div>
      <div class="hex" data-r="1" data-c="1"></div>
      <div class="hex" data-r="0" data-c="2"></div>
      <div class="hex" data-r="-1" data-c="2"></div>
      <div class="hex" data-r="-2" data-c="2"></div>
      <div class="hex" data-r="-2" data-c="1"></div>
      <div class="hex" data-r="-2" data-c="0"></div>
      <div class="hex" data-r="-1" data-c="-1"></div>
      <div class="hex" data-r="0" data-c="-2"></div>
      <div class="hex" data-r="1" data-c="-2"></div>
    </div>
  </body>
</html>
