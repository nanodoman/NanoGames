<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slizzle &mdash; slide puzzle</title>
    <script defer src="src/main.js?v=2.2.1"></script>
    <link rel="stylesheet" href="src/style.css?v=2.2.1" />
  </head>

  <body>
    <main class="frame">
      <button id="options-button" popovertarget="settings">&#9881;</button>

      <div id="settings" popover>
        <menu>
          <li>
            <label><input id="tile-nums" type="checkbox" />Tile nums</label>
          </li>
          <li>
            <label><input id="grid3" type="radio" name="size" value="3" onchange="GAME?.changeGrid(value)" />3x3</label>
          </li>
          <li>
            <label><input id="grid4" type="radio" name="size" value="4" onchange="GAME?.changeGrid(value)" checked />4x4</label>
          </li>
          <li>
            <label><input id="grid5" type="radio" name="size" value="5" onchange="GAME?.changeGrid(value)" />5x5</label>
          </li>
        </menu>
      </div>
      <div id="game" onpointerdown="GAME?.slide(event)"></div>
      <div id="menu">
        <span class="text"><output id="move-count">0</output></span>
        <span class="text" id="time-display">00:00</span>
        <button id="start-button" onclick="GAME?.initialize()">Start</button>
      </div>
    </main>

    <section id="records" class="frame">
      <p align="center">
        <label>
          Records
          <input type="checkbox" name="records-view" hidden />
        </label>
      </p>
      <ul id="entries"></ul>
    </section>
  </body>
</html>
